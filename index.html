<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- API OBJECT (يتحدث مع السيرفر) ---
    const api = {
        getClinics: async () => {
            const res = await fetch('/api/clinics');
            const data = await res.json();
            return data.data;
        },
        addClinic: async (clinic) => {
            const res = await fetch('/api/clinics', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(clinic)
            });
            return await res.json();
        },
        deleteClinic: async (id) => {
            const res = await fetch(`/api/clinics/${id}`, { method: 'DELETE' });
            return await res.json();
        },
        addPrescription: async (rx) => {
            const res = await fetch('/api/prescriptions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(rx)
            });
            return await res.json();
        }
    };

    // --- MAP MANAGER ---
    const mapManager = {
        mapInstance: null,
        markers: [],
        isPicking: false,
        clinicsData: [], // تخزين البيانات محلياً مؤقتاً للعرض السريع
        
        initMap: () => {
            mapManager.mapInstance = L.map('map').setView([30.5081, 47.7835], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapManager.mapInstance);
            
            mapManager.mapInstance.on('click', (e) => {
                if(mapManager.isPicking) mapManager.confirmLocationPick(e.latlng);
            });
        },

        renderMarkers: async () => {
            // جلب البيانات الحقيقية من السيرفر
            mapManager.clinicsData = await api.getClinics();
            
            // مسح العلامات القديمة
            mapManager.markers.forEach(m => mapManager.mapInstance.removeLayer(m));
            mapManager.markers = [];

            // رسم العلامات الجديدة
            mapManager.clinicsData.forEach(c => {
                const typeIcons = { hospital: 'fa-hospital', clinic: 'fa-stethoscope', pharmacy: 'fa-prescription-bottle' };
                const color = c.type === 'pharmacy' ? 'var(--accent)' : 'var(--primary)';
                
                const icon = L.divIcon({
                    html: `<div style="background:${color}; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white; box-shadow:0 3px 5px rgba(0,0,0,0.3)"><i class="fa-solid ${typeIcons[c.type]}"></i></div>`,
                    className: 'custom-icon',
                    iconSize: [30,30], iconAnchor: [15,30]
                });

                const marker = L.marker([c.lat, c.lng], {icon})
                    .addTo(mapManager.mapInstance)
                    .bindPopup(`<b>${c.name}</b><br>${c.owner}<br><button onclick="router.navigate('clinic', ${c.id})">دخول</button>`);
                mapManager.markers.push(marker);
            });
        },

        startLocationPick: () => {
            mapManager.isPicking = true;
            ui.closeModal('register-modal');
            document.getElementById('picker-msg').style.display = 'block';
            mapManager.mapInstance.getContainer().style.cursor = 'crosshair';
        },

        confirmLocationPick: (latlng) => {
            mapManager.isPicking = false;
            document.getElementById('picker-msg').style.display = 'none';
            mapManager.mapInstance.getContainer().style.cursor = '';
            
            window.tempPickedCoords = { lat: latlng.lat.toFixed(6), lng: latlng.lng.toFixed(6) };
            ui.openModal('register-modal');
            
            setTimeout(() => {
                document.getElementById('reg-lat').value = window.tempPickedCoords.lat;
                document.getElementById('reg-lng').value = window.tempPickedCoords.lng;
            }, 100);
        }
    };

    // --- CLINIC SYSTEM ---
    const clinicSystem = {
        currentClinicId: null,

        renderDashboard: (id) => {
            clinicSystem.currentClinicId = id;
            const c = mapManager.clinicsData.find(x => x.id == id); // جلب من البيانات المحملة
            
            document.getElementById('clinic-dynamic-content').innerHTML = `
                <div style="background:white; padding:20px; border-radius:10px; margin-bottom:20px; display:flex; justify-content:space-between;">
                    <div>
                        <h1>${c.name}</h1>
                        <p>${c.owner}</p>
                    </div>
                    <button class="btn btn-success" onclick="clinicSystem.openPrescriptionModal()">
                        <i class="fa-solid fa-file-prescription"></i> صرف وصفة جديدة
                    </button>
                </div>
                <p>بيانات العيادة محدثة من السيرفر.</p>
            `;
        },

        openPrescriptionModal: () => {
            document.getElementById('medicines-list').innerHTML = '';
            clinicSystem.addMedicineRow();
            ui.openModal('prescription-modal');
        },

        addMedicineRow: () => {
            const id = Date.now();
            const html = `
                <div class="med-item-card" id="med-row-${id}">
                    <div class="med-item-row">
                        <input type="text" placeholder="اسم الدواء" style="flex:2" required>
                        <select style="flex:1">
                            <option>1x يومياً</option>
                            <option>2x يومياً</option>
                        </select>
                        <button class="btn btn-danger btn-sm" onclick="document.getElementById('med-row-${id}').remove()">X</button>
                    </div>
                </div>
            `;
            document.getElementById('medicines-list').insertAdjacentHTML('beforeend', html);
        },

        finalizePrescription: async () => {
            const rows = document.querySelectorAll('.med-item-card');
            const medicines = [];
            rows.forEach(r => {
                medicines.push({
                    name: r.querySelector('input').value,
                    freq: r.querySelector('select').value
                });
            });

            // إرسال البيانات للسيرفر
            await api.addPrescription({
                clinic_id: clinicSystem.currentClinicId,
                date: new Date().toISOString(),
                details: medicines
            });

            ui.closeModal('prescription-modal');
            ui.showToast('تم حفظ الوصفة في قاعدة البيانات');
        }
    };

    // --- AUTH & ADMIN ---
    const auth = {
        registerClinic: async (e) => {
            e.preventDefault();
            const clinic = {
                name: document.getElementById('reg-name').value,
                type: document.getElementById('reg-type').value,
                lat: parseFloat(document.getElementById('reg-lat').value),
                lng: parseFloat(document.getElementById('reg-lng').value),
                owner: "مالك جديد"
            };

            await api.addClinic(clinic);
            ui.closeModal('register-modal');
            ui.showToast('تم التسجيل بنجاح');
            mapManager.renderMarkers(); // إعادة تحميل الخريطة
            e.target.reset();
        }
    };

    const adminSystem = {
        renderTable: async () => {
            const clinics = await api.getClinics(); // جلب البيانات الحقيقية
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = clinics.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td><b>${c.name}</b></td>
                    <td>${c.type}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="adminSystem.deleteClinic(${c.id})">حذف</button>
                    </td>
                </tr>
            `).join('');
        },

        deleteClinic: async (id) => {
            if(confirm('هل أنت متأكد؟')) {
                await api.deleteClinic(id);
                adminSystem.renderTable();
                ui.showToast('تم الحذف من السيرفر', 'error');
            }
        }
    };

    // --- UTILS & ROUTER ---
    const ui = {
        openModal: (id) => document.getElementById(id).style.display = 'flex',
        closeModal: (id) => document.getElementById(id).style.display = 'none',
        showToast: (msg) => {
            const el = document.createElement('div');
            el.className = 'toast';
            el.innerHTML = `<i class="fa-solid fa-check-circle"></i> ${msg}`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    };

    const router = {
        navigate: (view, params) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            if(view === 'home') mapManager.renderMarkers();
            if(view === 'clinic' && params) clinicSystem.renderDashboard(params);
            if(view === 'admin') adminSystem.renderTable();
        }
    };

    window.addEventListener('DOMContentLoaded', () => {
        mapManager.initMap();
        mapManager.renderMarkers();
    });
</script>
