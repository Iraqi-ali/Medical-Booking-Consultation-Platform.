<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    /* 
    ================================================================
       DATA LAYER (Simulating Database)
    ================================================================
    */
    const DB_KEY = 'mediconnect_db_v3'; 
    
    const seedData = {
        clinics: [
            { id: 101, name: "مجمع البصرة الطبي", owner: "د. علي حسن", type: "hospital", lat: 30.5081, lng: 47.7835, email: "admin@basra.com", status: "active", description: "أفضل مجمع طبي في قلب البصرة", available: true, social: { twitter: "#", instagram: "#" } },
            { id: 102, name: "عيادة الأسنان الحديثة", owner: "د. سارة", type: "dentist", lat: 30.5120, lng: 47.7900, email: "sara@smile.com", status: "active", description: "تركيب وتجميل أسنان", available: true, social: {} },
            { id: 103, name: "صيدلية الشعب", owner: "أحمد البصري", type: "pharmacy", lat: 30.5050, lng: 47.7750, email: "heal@pharm.com", status: "active", description: "خدمة توصيل الدواء", available: true, social: {} }
        ],
        appointments: [],
        currentUser: null
    };

    const localDB = {
        getData: () => {
            const data = localStorage.getItem(DB_KEY);
            return data ? JSON.parse(data) : seedData;
        },
        saveData: (data) => {
            localStorage.setItem(DB_KEY, JSON.stringify(data));
        },
        getClinics: () => localDB.getData().clinics,
        addClinic: (clinic) => {
            const data = localDB.getData();
            clinic.id = Date.now();
            data.clinics.push(clinic);
            localDB.saveData(data);
            return clinic;
        },
        deleteClinic: (id) => {
            const data = localDB.getData();
            data.clinics = data.clinics.filter(c => c.id != id);
            localDB.saveData(data);
        },
        addAppointment: (appt) => {
            const data = localDB.getData();
            appt.id = Date.now();
            data.appointments.push(appt);
            localDB.saveData(data);
        },
        getAppointmentsForClinic: (clinicId) => {
            const data = localDB.getData();
            return data.appointments.filter(a => a.clinicId == clinicId);
        }
    };

    const ui = {
        showToast: (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        },
        openModal: (id) => {
            const modal = document.getElementById(id);
            if(modal) modal.style.display = 'flex';
        },
        closeModal: (id) => {
            const modal = document.getElementById(id);
            if(modal) modal.style.display = 'none';
        }
    };

    const router = {
        navigate: (viewName, params = null) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            if (viewName === 'home') {
                if (!mapManager.mapInstance) mapManager.initMap();
                mapManager.renderMarkers();
            } else if (viewName === 'clinic' && params) {
                clinicSystem.renderDashboard(params);
            } else if (viewName === 'admin') {
                adminSystem.renderTable();
            }
        }
    };

    // متغير لتخزين الإحداثيات مؤقتاً بشكل آمن
    window.tempPickedCoords = null;

    const mapManager = {
        mapInstance: null,
        markers: [],
        tempMarker: null,
        isPicking: false,
        
        initMap: () => {
            mapManager.mapInstance = L.map('map').setView([30.5081, 47.7835], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(mapManager.mapInstance);

            mapManager.mapInstance.on('click', (e) => {
                if (mapManager.isPicking) {
                    mapManager.confirmLocationPick(e.latlng);
                }
            });
        },

        getIconHtml: (type) => {
            let iconClass = 'fa-hospital';
            let colorClass = 'icon-hospital';
            if (type === 'pharmacy') { iconClass = 'fa-prescription-bottle'; colorClass = 'icon-pharmacy'; }
            if (type === 'dentist') { iconClass = 'fa-tooth'; colorClass = 'icon-dentist'; }
            return `<div class="custom-map-icon ${colorClass}"><i class="fa-solid ${iconClass}"></i></div>`;
        },

        renderMarkers: (filter = {}) => {
            mapManager.markers.forEach(m => mapManager.mapInstance.removeLayer(m));
            mapManager.markers = [];
            const clinics = localDB.getClinics();
            
            clinics.forEach(clinic => {
                if (filter.specialty && filter.specialty !== 'all' && clinic.type !== filter.specialty) return;
                if (filter.available && !clinic.available) return;

                const iconHtml = mapManager.getIconHtml(clinic.type);
                const customIcon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-div-icon',
                    iconSize: [40, 40],
                    iconAnchor: [20, 40]
                });

                const marker = L.marker([clinic.lat, clinic.lng], { icon: customIcon })
                    .addTo(mapManager.mapInstance)
                    .bindPopup(`
                        <div style="text-align:right; font-family:'Tajawal'">
                            <h4 style="margin-bottom:5px">${clinic.name}</h4>
                            <button onclick="router.navigate('clinic', ${clinic.id})" style="margin-top:5px; background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer">الدخول للعيادة</button>
                        </div>
                    `);
                mapManager.markers.push(marker);
            });
        },

        updateFilter: () => {
            const specialty = document.getElementById('filter-specialty').value;
            const available = document.getElementById('filter-available').checked;
            mapManager.renderMarkers({ specialty, available });
            ui.showToast('تم تحديث الخريطة');
        },

        startLocationPick: () => {
            mapManager.isPicking = true;
            // إغلاق جميع المودالز
            document.querySelectorAll('.modal-overlay').forEach(el => el.style.display = 'none');
            
            document.getElementById('picker-msg').style.display = 'block';
            mapManager.mapInstance.getContainer().style.cursor = 'crosshair';
            
            // إزالة العلامة السابقة إذا وجدت
            if (mapManager.tempMarker) {
                mapManager.mapInstance.removeLayer(mapManager.tempMarker);
                mapManager.tempMarker = null;
            }
        },

        confirmLocationPick: (latlng) => {
            // 1. إعادة ضبط الحالة
            mapManager.isPicking = false;
            document.getElementById('picker-msg').style.display = 'none';
            mapManager.mapInstance.getContainer().style.cursor = '';

            if (!latlng || !latlng.lat || !latlng.lng) {
                ui.showToast('لم يتم تحديد الموقع بشكل صحيح', 'error');
                return;
            }

            // 2. حفظ الإحداثيات في المتغير العام (نسخة احتياطية)
            window.tempPickedCoords = {
                lat: latlng.lat.toFixed(6),
                lng: latlng.lng.toFixed(6)
            };

            // 3. إضافة العلامة الحمراء
            if (mapManager.tempMarker) mapManager.mapInstance.removeLayer(mapManager.tempMarker);
            
            mapManager.tempMarker = L.marker([latlng.lat, latlng.lng], {
                icon: L.divIcon({
                    html: '<div style="color:red; font-size:2rem; text-shadow: 0 0 5px white;"><i class="fa-solid fa-location-dot"></i></div>',
                    className: 'temp-marker',
                    iconSize: [30,30],
                    iconAnchor: [15,30]
                })
            }).addTo(mapManager.mapInstance)
              .bindPopup("تم تحديد الموقع هنا").openPopup();

            // 4. فتح النافذة
            ui.openModal('register-modal');

            // 5. مهم جداً: استخدام setTimeout لكتابة الإحداثيات بعد فتح النافذة مباشرة
            // هذا يضمن أن الحقول موجودة ومرئية قبل محاولة الكتابة فيها
            setTimeout(() => {
                const latInput = document.getElementById('reg-lat');
                const lngInput = document.getElementById('reg-lng');

                if (latInput && lngInput) {
                    latInput.value = window.tempPickedCoords.lat;
                    lngInput.value = window.tempPickedCoords.lng;
                    
                    // تغيير لون الحدود للإشارة للنجاح
                    latInput.style.borderColor = '#28a745';
                    lngInput.style.borderColor = '#28a745';
                    
                    console.log('Coordinates filled:', window.tempPickedCoords); // للتأكد في الكونسول
                } else {
                    console.error('Could not find input fields');
                    ui.showToast('حدث خطأ في العثور على الحقول', 'error');
                }
            }, 100); // تأخير 100 ميلي ثانية فقط
            
            ui.showToast('تم اختيار الموقع');
        }
    };

    const bookingSystem = {
        openBookingModal: (clinicId) => {
            document.getElementById('book-clinic-id').value = clinicId;
            ui.openModal('booking-modal');
        },
        createBooking: (e) => {
            e.preventDefault();
            const clinicId = document.getElementById('book-clinic-id').value;
            const newBooking = {
                clinicId,
                patientName: document.getElementById('book-name').value,
                patientAge: document.getElementById('book-age').value,
                medicalHistory: document.getElementById('book-history').value,
                time: document.getElementById('book-time').value,
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            localDB.addAppointment(newBooking);
            ui.closeModal('booking-modal');
            ui.showToast('تم حجز الموعد بنجاح!');
            e.target.reset();
            if(document.getElementById('view-clinic').classList.contains('active')) {
                clinicSystem.renderDashboard(clinicId);
            }
        }
    };

    const clinicSystem = {
        renderDashboard: (clinicId) => {
            const clinic = localDB.getClinics().find(c => c.id == clinicId);
            if (!clinic) return router.navigate('home');
            const appointments = localDB.getAppointmentsForClinic(clinicId);
            const pendingAppts = appointments.filter(a => a.status === 'pending');
            
            const container = document.getElementById('clinic-dynamic-content');
            container.innerHTML = `
                <div class="clinic-header">
                    <img src="https://picsum.photos/seed/${clinic.id}/200/200" class="clinic-avatar" alt="Logo">
                    <div class="clinic-info" style="flex:1">
                        <h1>${clinic.name}</h1>
                        <div class="clinic-meta">
                            <span><i class="fa-solid fa-user-md"></i> ${clinic.owner}</span>
                            <span><i class="fa-solid fa-circle" style="color: ${clinic.available ? 'var(--accent)' : 'var(--danger)'}"></i> ${clinic.available ? 'متاح' : 'مغلق'}</span>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="bookingSystem.openBookingModal(${clinic.id})">حجز موعد جديد</button>
                </div>
                <div class="panel">
                    <h3>المواعيد</h3>
                    ${pendingAppts.length === 0 ? '<p>لا توجد حجوزات جديدة</p>' : 
                    pendingAppts.map(appt => `
                        <div class="appointment-item">
                            <div class="patient-info">
                                <h4>${appt.patientName} <small>(${appt.patientAge} سنة)</small></h4>
                                <small>${new Date(appt.time).toLocaleString('ar-SA')}</small>
                            </div>
                            <button class="btn btn-success" onclick="clinicSystem.completeAppt(${appt.id}, ${clinicId})">إتمام</button>
                        </div>
                    `).join('')}
                </div>
            `;
        },
        completeAppt: (apptId, clinicId) => {
            const data = localDB.getData();
            const appt = data.appointments.find(a => a.id == apptId);
            if(appt) {
                appt.status = 'completed';
                localDB.saveData(data);
                ui.showToast('تم إتمام الكشف');
                clinicSystem.renderDashboard(clinicId);
            }
        }
    };

    const auth = {
        toggleLogin: () => { ui.openModal('register-modal'); },
        registerClinic: (e) => {
            e.preventDefault();
            const lat = document.getElementById('reg-lat').value;
            const lng = document.getElementById('reg-lng').value;

            if(!lat || !lng) {
                ui.showToast('الرجاء اختيار الموقع من الخريطة أولاً', 'error');
                return;
            }

            const newClinic = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                type: document.getElementById('reg-type').value,
                owner: "المالك",
                lat: parseFloat(lat), 
                lng: parseFloat(lng),
                status: 'active',
                available: true,
                description: 'عيادة جديدة',
                social: {}
            };

            localDB.addClinic(newClinic);
            ui.closeModal('register-modal');
            ui.showToast('تم إنشاء العيادة بنجاح!');
            
            e.target.reset();
            if (mapManager.tempMarker) mapManager.mapInstance.removeLayer(mapManager.tempMarker);
            mapManager.renderMarkers();
        }
    };

    const adminSystem = {
        renderTable: () => {
            const clinics = localDB.getClinics();
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = clinics.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.type}</td>
                    <td><button class="btn btn-danger" onclick="adminSystem.deleteClinic(${c.id})">حذف</button></td>
                </tr>
            `).join('');
        },
        deleteClinic: (id) => {
            if(confirm('حذف؟')) {
                localDB.deleteClinic(id);
                adminSystem.renderTable();
                mapManager.renderMarkers();
            }
        }
    };

    window.addEventListener('DOMContentLoaded', () => {
        if(!localStorage.getItem(DB_KEY)) localDB.saveData(seedData);
        mapManager.initMap();
        mapManager.renderMarkers();
    });
</script>
